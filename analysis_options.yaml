include: package:flutter_lints/flutter.yaml

analyzer:
  # These 3 lines fix your null safety and type issues
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false
  
  # This fixes your BuildContext async gap warnings
  errors:
    use_build_context_synchronously: error
    unused_local_variable: ignore

linter:
  rules:
    # These 10 rules will fix 90% of your issues:
    - use_build_context_synchronously      # Fixes your AuthProvider warnings
    - unawaited_futures                    # Catches missing await
    - prefer_const_constructors            # Performance
    - prefer_final_locals                  # Clean code
    - avoid_print                          # Remove debug prints
    - prefer_single_quotes                 # Consistency
    - sort_child_properties_last           # Readable widgets
    - use_key_in_widget_constructors       # Flutter performance
    - use_rethrow_when_possible            # Better error handling